name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            platform: windows-x64
          - os: macos-15
            platform: macos-universal
          - os: ubuntu-22.04
            platform: linux-x64

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            pkg-config \
            xvfb \
            xorg-dev

      - name: Configure the MSVC deployment environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $visualStudio = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if (-not $visualStudio) {
            throw "Visual Studio with the MSVC x64 toolchain was not found."
          }
          $vcInstallDir = Join-Path $visualStudio "VC"
          "VCINSTALLDIR=$vcInstallDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "MSVC deployment runtime: $vcInstallDir"

      - name: Configure CMake
        if: runner.os != 'macOS'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DPIXELART_BUILD_TESTS=ON
          -DPIXELART_ENABLE_ONNXRUNTIME=OFF
          -DPIXELART_ENABLE_OPENCV_DNN=OFF

      - name: Configure CMake for macOS universal binary
        if: runner.os == 'macOS'
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
          -DPIXELART_BUILD_TESTS=ON
          -DPIXELART_ENABLE_ONNXRUNTIME=OFF
          -DPIXELART_ENABLE_OPENCV_DNN=OFF

      - name: Build all targets
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ env.BUILD_TYPE }} --output-on-failure

      - name: Install package files
        run: cmake --install build --config ${{ env.BUILD_TYPE }} --prefix "${{ github.workspace }}/package/PixelArt98-${{ matrix.platform }}"

      - name: Verify deployed package structure
        run: >
          cmake
          -DPIXELART_DEPLOY_ROOT=${{ github.workspace }}/package/PixelArt98-${{ matrix.platform }}
          -DPIXELART_DEPLOY_PLATFORM=${{ runner.os == 'Windows' && 'windows' || runner.os == 'macOS' && 'macos' || 'linux' }}
          -DPIXELART_REQUIRE_UNIVERSAL_MACOS=${{ runner.os == 'macOS' && 'ON' || 'OFF' }}
          -P cmake/VerifyDeployment.cmake

      - name: Smoke-test deployed application on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "${{ github.workspace }}/package/PixelArt98-${{ matrix.platform }}"
          $env:PATH = "$packageDir\bin;$env:SystemRoot\System32;$env:SystemRoot"
          Remove-Item Env:QT_PLUGIN_PATH -ErrorAction SilentlyContinue
          Remove-Item Env:QML2_IMPORT_PATH -ErrorAction SilentlyContinue
          & "$packageDir\bin\PixelArt98.exe" --deployment-smoke-test
          if ($LASTEXITCODE -ne 0) {
            throw "The deployed Windows application exited with code $LASTEXITCODE."
          }

      - name: Smoke-test deployed application on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ github.workspace }}/package/PixelArt98-${{ matrix.platform }}"
          env -u LD_LIBRARY_PATH -u QT_PLUGIN_PATH -u QML2_IMPORT_PATH \
            xvfb-run -a "${package_dir}/bin/PixelArt98" --deployment-smoke-test

      - name: Verify and smoke-test deployed application on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="${{ github.workspace }}/package/PixelArt98-${{ matrix.platform }}"
          application="${package_dir}/PixelArt98.app"
          codesign --verify --deep --strict --verbose=2 "${application}"
          env -u DYLD_LIBRARY_PATH -u QT_PLUGIN_PATH -u QML2_IMPORT_PATH \
            "${application}/Contents/MacOS/PixelArt98" --deployment-smoke-test

      - name: Package application on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="package/PixelArt98-${{ matrix.platform }}"
          cmake -E copy README.md "${package_dir}/README.md"
          cmake -E copy FEATURES.md "${package_dir}/FEATURES.md"
          cmake -E make_directory dist
          cmake -E chdir package cmake -E tar cfv "../dist/PixelArt98-${{ matrix.platform }}.zip" --format=zip -- "PixelArt98-${{ matrix.platform }}"

      - name: Package executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageDir = "package/PixelArt98-${{ matrix.platform }}"
          cmake -E copy README.md "$packageDir/README.md"
          cmake -E copy FEATURES.md "$packageDir/FEATURES.md"
          cmake -E make_directory dist
          cmake -E chdir package cmake -E tar cfv "../dist/PixelArt98-${{ matrix.platform }}.zip" --format=zip -- "PixelArt98-${{ matrix.platform }}"

      - name: Upload executable archive
        uses: actions/upload-artifact@v7
        with:
          name: pixelart98-${{ matrix.platform }}
          path: dist/PixelArt98-${{ matrix.platform }}.zip
          if-no-files-found: error
          retention-days: 30

  source:
    name: Package source
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          cmake -E make_directory dist
          version="${GITHUB_REF_NAME:-snapshot}"
          safe_version="$(printf '%s' "$version" | sed 's#[/\\]#-#g')"
          git archive --format=zip --prefix="PixelArt98-${safe_version}/" HEAD -o "dist/PixelArt98-source-${safe_version}.zip"

      - name: Upload source archive
        uses: actions/upload-artifact@v7
        with:
          name: pixelart98-source
          path: dist/PixelArt98-source-*.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: github.event_name != 'pull_request' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    needs:
      - build
      - source
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          pattern: pixelart98-*
          merge-multiple: true

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_tag="$GITHUB_REF_NAME"
            release_title="PixelArt98 ${GITHUB_REF_NAME}"
            create_args=(--title "$release_title" --generate-notes)
          else
            release_tag="continuous"
            release_title="PixelArt98 Continuous Build"
            release_notes="Automated build from main at ${GITHUB_SHA}."
            create_args=(--title "$release_title" --notes "$release_notes" --prerelease --latest=false --target "$GITHUB_SHA")

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag --force "$release_tag" "$GITHUB_SHA"
            git push --force origin "refs/tags/${release_tag}"
          fi

          if gh release view "$release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$release_tag" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --clobber
            if [[ "$release_tag" == "continuous" ]]; then
              gh release edit "$release_tag" --repo "$GITHUB_REPOSITORY" --title "$release_title" --notes "$release_notes" --prerelease --target "$GITHUB_SHA"
            fi
          else
            gh release create "$release_tag" release-assets/*.zip --repo "$GITHUB_REPOSITORY" "${create_args[@]}"
          fi
